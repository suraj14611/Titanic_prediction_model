<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Predictor</title>
</head>
<body>
    <h1>Enter Passenger Details</h1>
    <form method="post">
        <label>Pclass:</label><br>
        <input type="number" name="Pclass" min="1" max="3" required><br>

        <label>Sex:</label><br>
        <select name="Sex" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br>

        <label>Age:</label><br>
        <input type="number" name="Age" step="any" required><br>

        <label>Fare:</label><br>
        <input type="number" name="Fare" step="any" required><br>

        <label>Embarked:</label><br>
        <select name="Embarked" required>
            <option value="S">Southampton (S)</option>
            <option value="C">Cherbourg (C)</option>
            <option value="Q">Queenstown (Q)</option>
        </select><br>

        <label>Siblings/Spouses Aboard (SibSp):</label><br>
        <input type="number" name="SibSp" min="0" required><br>

        <label>Parents/Children Aboard (Parch):</label><br>
        <input type="number" name="Parch" min="0" required><br>

        <label>Name:</label><br>
        <input type="text" name="Name" required><br><br>

        <input type="submit" value="Predict Survival">
    </form>
</body>
</html>
